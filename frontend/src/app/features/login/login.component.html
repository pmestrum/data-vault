<div class="login-page">
  <div class="card login-card">
    <div class="login-header">
      <h1 class="login-title">🔐 Data Vault</h1>
      <p class="text-muted mt-1">Secure record storage</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" class="form-control" formControlName="username"
               type="text" autocomplete="username" placeholder="admin" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-control" formControlName="password"
               type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary w-full" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
