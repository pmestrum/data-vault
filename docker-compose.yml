version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - data-vault-net
    environment:
      MONGO_INITDB_DATABASE: datavault

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    networks:
      - data-vault-net
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/datavault
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_LOG_PASSWORD: ${ADMIN_BOOTSTRAP_LOG_PASSWORD:-false}
      HTTPS_ENABLED: "true"
      HTTPS_CERT_DIR: /certs/backend
      HTTPS_CERT_FILE: cert.pem
      HTTPS_KEY_FILE: key.pem
      HTTPS_CERT_CN: ${HTTPS_CERT_CN:-datavault.home}
      HTTPS_EXTRA_SANS: ${HTTPS_EXTRA_SANS:-datavault.home}
      REGENERATE_HTTPS_CERTS: ${REGENERATE_HTTPS_CERTS:-false}
    volumes:
      - backend-certs:/certs/backend
    expose:
      - "3000"
    ports:
      - "3011:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - data-vault-net
    environment:
      HTTPS_CERT_DIR: /certs/frontend
      HTTPS_CERT_FILE: cert.pem
      HTTPS_KEY_FILE: key.pem
      HTTPS_CERT_CN: ${HTTPS_CERT_CN:-datavault.home}
      HTTPS_EXTRA_SANS: ${HTTPS_EXTRA_SANS:-datavault.home}
      REGENERATE_HTTPS_CERTS: ${REGENERATE_HTTPS_CERTS:-false}
    volumes:
      - frontend-certs:/certs/frontend
    ports:
      - "4200:443"

volumes:
  mongo-data:
  backend-certs:
  frontend-certs:

networks:
  data-vault-net:
    driver: bridge

