version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - data-vault-net
    environment:
      MONGO_INITDB_DATABASE: datavault

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    networks:
      - data-vault-net
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/datavault
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_LOG_PASSWORD: ${ADMIN_BOOTSTRAP_LOG_PASSWORD:-false}
      HTTPS_ENABLED: "true"
      HTTPS_CERT_DIR: /certs/backend
      HTTPS_CERT_FILE: cert.pem
      HTTPS_KEY_FILE: key.pem
      HTTPS_CERT_CN: ${HTTPS_CERT_CN:-datavault.home}
      HTTPS_EXTRA_SANS: ${HTTPS_EXTRA_SANS:-datavault.home}
      REGENERATE_HTTPS_CERTS: ${REGENERATE_HTTPS_CERTS:-false}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      LETSENCRYPT_DOMAIN: ${LETSENCRYPT_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      LETSENCRYPT_AGREE_TOS: ${LETSENCRYPT_AGREE_TOS:-false}
    volumes:
      - backend-certs:/certs/backend
      - letsencrypt:/etc/letsencrypt
    expose:
      - "3000"
    ports:
      - "3011:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - data-vault-net
    environment:
      HTTPS_CERT_DIR: /certs/frontend
      HTTPS_CERT_FILE: cert.pem
      HTTPS_KEY_FILE: key.pem
      HTTPS_CERT_CN: ${HTTPS_CERT_CN:-datavault.home}
      HTTPS_EXTRA_SANS: ${HTTPS_EXTRA_SANS:-datavault.home}
      REGENERATE_HTTPS_CERTS: ${REGENERATE_HTTPS_CERTS:-false}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      LETSENCRYPT_DOMAIN: ${LETSENCRYPT_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      LETSENCRYPT_AGREE_TOS: ${LETSENCRYPT_AGREE_TOS:-false}
    volumes:
      - frontend-certs:/certs/frontend
      - letsencrypt:/etc/letsencrypt
    ports:
      - "4200:443"

  certbot-renewal:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --non-interactive; sleep 12h & wait $${!}; done"
    environment:
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}

volumes:
  mongo-data:
  backend-certs:
  frontend-certs:
  letsencrypt:

networks:
  data-vault-net:
    driver: bridge

